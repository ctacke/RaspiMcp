name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Validate tag format (vX.X or vX.X.X)
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "::error::Tag '$TAG' does not match the required vX.X or vX.X.X format (e.g. v1.0, v0.9.1, v2.3)."
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore RaspiMcp.slnx

      - name: Build
        run: dotnet build RaspiMcp.slnx -c Release --no-restore

      - name: Test
        run: dotnet test tests/RaspiMcp.Tests/RaspiMcp.Tests.csproj -c Release --no-build

      - name: Publish plugins-src plugins
        run: dotnet publish plugins-src/RaspiMcp.Gpio -c Release -o gpio-publish

      - name: Publish self-contained binaries
        shell: bash
        run: |
          set -e
          for rid in win-x64 linux-x64 osx-x64 osx-arm64; do
            dotnet publish src/RaspiMcp.Server \
              -c Release \
              -r "$rid" \
              --self-contained \
              -p:PublishSingleFile=true \
              -p:Version=${{ steps.version.outputs.VERSION }} \
              -o "publish/$rid"
            cp appsettings.json.example "publish/$rid/"
            mkdir -p "publish/$rid/plugins"
            cp gpio-publish/RaspiMcp.Gpio.dll "publish/$rid/plugins/"
          done

      - name: Archive binaries
        shell: bash
        run: |
          mkdir -p artifacts
          for rid in win-x64 linux-x64 osx-x64 osx-arm64; do
            (cd "publish/$rid" && zip -r "../../artifacts/RaspiMcp.Server-${{ steps.version.outputs.VERSION }}-$rid.zip" .)
          done

      - name: Pack NuGet tool package
        run: >
          dotnet pack src/RaspiMcp.Server/RaspiMcp.Server.csproj
          -c Release
          -p:Version=${{ steps.version.outputs.VERSION }}
          -o artifacts

      - name: NuGet login (trusted publishing)
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: ctacke

      - name: Push package to NuGet.org
        run: dotnet nuget push artifacts/*.nupkg --source "https://api.nuget.org/v3/index.json" --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/RaspiMcp.Server-*.zip
          generate_release_notes: true
